name: socket-server
description: Implement the WebSocket socket server per specs/socket.yaml

requirements:
  - category: socket service
    description: WebSocket event service per specs/socket.yaml
    items:
      - The socket service defaults to port 8081
      - Unauthenticated WebSocket connection attempts receive 401
      - Non-member connection attempts receive 403
      - Admins are implicit members of every channel and may connect to any channel event stream
      - Clients receive MessageEvent JSON when a message is created, updated, or deleted in the channel
      - Clients receive MemberEvent JSON when a user joins or leaves the channel
      - Clients receive UserEvent JSON when a channel member updates their username
      - Clients can send an Unsubscribe message (empty JSON object) to close the connection
    passing: false

  - category: rest service NATS events
    description: REST service publishes correctly shaped event payloads to NATS so the socket service can relay them
    items:
      - The REST service publishes a MessageEvent payload on message create, update, and delete
      - The REST service publishes a MemberEvent payload on member add and remove
      - The REST service publishes a UserEvent payload when a channel member updates their username
    passing: false

  - category: socket end to end tests
    description: E2E tests for the socket service per docs/testing.md
    items:
      - Connecting to a channel event stream without authentication returns 401
      - Connecting to a channel event stream as a non-member returns 403
      - A channel member receives a MessageEvent over WebSocket when a message is posted to the channel via the REST API
    passing: false
