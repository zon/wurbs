name: ops
description: Wurbs configuration, secrets management, and cluster operations

requirements:
  - category: core/config
    description: Deep module for loading configuration and secrets from files
    items:
      - Exposes a narrow public interface for loading config and secrets
      - Exposes a Config struct containing the non-sensitive settings required by the apps
      - Config is read from and written to config.yaml in the config directory
      - The config directory defaults to /etc/wurbs and can be overridden with the WURB_CONFIG env var
      - In test mode, if WURB_CONFIG is not set, the module walks up from the working directory to find the git repo root and uses ./config there if it exists
      - Dir caches its result so the resolution logic runs at most once
    passing: true

  - category: core/k8s
    description: Deep module for Kubernetes interactions via kubectl
    items:
      - Exposes a narrow public interface for Kubernetes interactions via kubectl
      - GetClusterIP returns the cluster server host from the kubectl config for a given context
      - GetSecret retrieves and decodes a Kubernetes Secret by name, namespace, and context
      - ApplyConfigmap creates or updates a Kubernetes ConfigMap via kubectl apply
      - ApplySecret creates or updates a Kubernetes Secret via kubectl apply
      - WriteConfigmapFile writes a Kubernetes ConfigMap YAML to a local file
      - WriteSecretFile writes a Kubernetes Secret YAML to a local file
      - wurbctl/set imports core/k8s instead of implementing kubectl calls directly
    passing: true

  - category: wurbctl
    description: CLI tool for configuring and managing the Wurbs service
    items:
      - wurbctl set config writes config.yaml to the repo config directory with any non-sensitive settings
      - wurbctl set config applies config.yaml as a ConfigMap in the ralph-wurbs namespace
      - wurbctl set config copies the NATS dev token from the dev-token key of the nats-secrets secret in the nats namespace into the repo config directory
      - wurbctl set config copies the NATS dev token into the ralph-wurbs namespace
      - wurbctl set config copies the postgres secret into the ralph-wurbs namespace with the host set to the internal Kubernetes service address
    passing: false

  - category: ralph workflow
    description: Ralph agent workflow configuration for running in Kubernetes
    items:
      - The workflow uses /etc/wurbs as the config directory
      - The workflow mounts config.yaml from the ConfigMap into the config directory
      - The workflow mounts the NATS dev token into the config directory
      - The workflow mounts the postgres secret into the config directory
    passing: false
