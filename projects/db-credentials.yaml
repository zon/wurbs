name: db-credentials
description: Change how database credentials are handled to use CloudNativePG secrets

requirements:
  - category: configuration
    description: Database credentials handled via CloudNativePG secrets
    items:
      - The config directory expects a postgres.json file in CloudNativePG format
      - "`wurbctl set config` copies the secret from `wurbs/wurbs-postgres-app` to `./config/postgres.json` from the repo root"
      - The `postgres.json` file is edited to set the cluster's IP as the host and 32432 as the port
    passing: true

  - category: backend
    description: Update the service to read database credentials from the new JSON format
    items:
      - The service reads database connection details from `postgres.json` in the config directory
    passing: false
