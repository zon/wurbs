name: db-credentials-2
description: Change how database credentials are handled to use CloudNativePG secrets

requirements:
  - category: configuration
    description: Database credentials handled via CloudNativePG secrets
    items:
      - The `./config` directory is git ignored
      - "`wurbctl set config` loads the `wurbs-postgres-app` secret from the `wurbs` namespace using `core/pg`"
      - The secret is patched for local access by replacing the host with the cluster IP and port with 32432, including all URI fields that contain the host and port
      - The patched secret is saved to `./config/postgres.json` in CloudNativePG secret format
    passing: true

  - category: backend
    description: The server uses core/config and core/pg for database connections
    items:
      - The server uses `core/config` to resolve the config directory and `core/pg` to read `postgres.json` and open a gorm.DB connection
    passing: true

  - category: migrate
    description: wurbctl migrate db runs GORM AutoMigrate to set up the database schema
    items:
      - "`wurbctl migrate db` uses `core/config` to resolve the config directory and `core/pg` to read `postgres.json` and open a gorm.DB connection"
      - "`wurbctl migrate db` runs GORM AutoMigrate to create or update all model tables"
    passing: false

  - category: config
    description: A core/config package that resolves the config directory path
    items:
      - core/config resolves the config directory from the `WURBS_CONFIG` env var if set, otherwise `./config` relative to the repo root
    passing: true

  - category: pg
    description: A core/pg package providing the CloudNativePG secret type and a GORM database connection
    items:
      - core/pg defines a Secret struct with fields matching the CloudNativePG secret file format (username, password, dbname, host, port, uri, pgpass, jdbc-uri, fqdn-uri, fqdn-jdbc-uri)
      - core/pg can read a Secret from a JSON file at a given path
      - core/pg can write a Secret to a JSON file at a given path
      - core/pg can open a gorm.DB connection from a Secret
    passing: true
