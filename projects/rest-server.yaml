name: rest-server
description: Implement the REST server following specs/rest.yaml

requirements:
  - category: auth
    description: OIDC and client credential authentication endpoints
    items:
      - GET /auth/login redirects to the OIDC provider authorization endpoint
      - GET /auth/callback exchanges the authorization code for tokens, matches the identity provider email to a user record and stores the subject ID, then returns a TokenSet
      - POST /auth/logout revokes the refresh token and redirects to the OIDC end-session endpoint
      - POST /auth/refresh exchanges a refresh token for a new access token and returns a TokenSet
      - Clients can authenticate using the client credentials flow
      - Real users (including real admins) can only authenticate with OIDC
      - Test users (including test admins) can only authenticate with client credentials
    passing: true

  - category: users
    description: User management endpoints
    items:
      - GET /users/{userId} returns a User by UUID
      - PATCH /users/{userId} updates a user; users may edit themselves, only admins may set admin or inactive fields; email may not be edited
      - User responses do not include email
    passing: true

  - category: channels
    description: Channel management endpoints matching the spec
    items:
      - POST /channels creates a channel (admin only) and returns the created Channel
      - GET /channels/{channelId} returns a Channel by UUID
      - PATCH /channels/{channelId} updates a channel (admin only); channels may be inactive but not deleted
      - Real channels can only contain real users
      - Test channels can only contain test users
    passing: true

  - category: members
    description: Channel membership endpoints
    items:
      - POST /channels/{channelId}/members invites a user by userId or email (admin only)
      - If no user account exists with the given email, a new user is created before the invite
    passing: true

  - category: admin users
    description: Admin capabilities for managing channels and users
    items:
      - Admin users can manage channels and invite users
      - Real admins (IsAdmin=true, IsTest=false) can only alter real channels and users
      - Test admins (IsAdmin=true, IsTest=true) can only alter test channels and users
    passing: true

  - category: nats
    description: NATS subject naming conventions
    items:
      - All NATS subjects are prefixed with "wurbs." to avoid conflicts with other apps
    passing: true

  - category: handler package
    description: REST handlers are organized in a rest/handler sub-package with separate files per domain
    items:
      - Handlers are in a rest/handler sub-package
      - Auth handlers are in rest/handler/auth.go
      - Channel handlers are in rest/handler/channel.go
      - Member handlers are in rest/handler/member.go
      - Message handlers are in rest/handler/message.go
      - User handlers are in rest/handler/user.go
    passing: true

  - category: models
    description: Database model base fields
    items:
      - Database models include id, created_at, and updated_at fields but not deleted_at (no soft deletes)
    passing: false

  - category: core/user
    description: User domain logic is separated into a core/user package
    items:
      - The User model and all user management logic (find, create, update) lives in a core/user package
      - core/auth depends on core/user rather than defining user types itself
    passing: true

  - category: end-to-end tests
    description: REST server tests run against a local dev server using only public HTTP interfaces and do not connect directly to the database or NATS
    items:
      - Tests run against a local dev server and interact with it only through HTTP endpoints, not by connecting directly to the database or NATS
      - Tests only create and use test users (IsTest=true) and test channels
    passing: false

  - category: messages
    description: Message endpoints
    items:
      - GET /channels/{channelId}/messages lists messages paged by time using before/after query params and returns a MessagePage
      - POST /channels/{channelId}/messages posts a message to a channel and returns the created Message
      - PATCH /messages/{messageId} edits a message (owner only) and returns the updated Message
      - DELETE /messages/{messageId} deletes a message (owner or admin) and returns 204
    passing: true
