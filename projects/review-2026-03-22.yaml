name: review-2026-03-22
description: Fix Go naming, documentation, and formatting issues

requirements:
  - category: backend
    description: Fix Go MixedCaps naming convention issues
    items:
      - Rename JWKSURI to JwksURI in core/auth/oidc.go (struct field uses uppercase acronyms, should use MixedCaps like JwksURI)
      - Rename user.User to user.UserModel in core/channel/channel.go for clarity
      - Rename AuthHandler, UserHandler, ChannelHandler, MessageHandler, MemberHandler in rest/handler/ to Auth, User, Channel, Message, Member to avoid redundant package name prefix (e.g., handler.AuthHandler -> handler.Auth)
      - Rename ConfigMap in core/config/configmap.go to Map to avoid redundant "Config" prefix (e.g., config.ConfigMap -> config.Map)
    passing: false

  - category: backend
    description: Add missing package comments for Go packages
    items:
      - Add package comment to core/message/message.go (e.g., "// Package message provides chat message functionality.")
      - Add package comment to core/channel/channel.go (e.g., "// Package channel provides channel management functionality.")
      - Add package comment to core/config/config.go (e.g., "// Package config provides configuration loading and management.")
      - Add package comment to core/user/user.go (e.g., "// Package user provides user management functionality.")
      - Add package comment to core/auth/auth.go (e.g., "// Package auth provides authentication and authorization.")
      - Add package comment to core/pg/pg.go (e.g., "// Package pg provides PostgreSQL database connectivity.")
      - Add package comment to core/nats/nats.go (e.g., "// Package nats provides NATS messaging connectivity.")
      - Add package comment to core/k8s/k8s.go (e.g., "// Package k8s provides Kubernetes integration.")
      - Add package comment to core/markdown/markdown.go (e.g., "// Package markdown provides markdown processing.")
    passing: false

  - category: backend
    description: Add doc comments to exported types and functions
    items:
      - Add doc comments to exported types in core/channel/channel.go (Channel struct)
      - Add doc comments to exported functions in core/channel/channel.go (Create, Get, List, Delete, AddMember, RemoveMember)
      - Add doc comments to exported types in core/config/config.go (Config struct)
      - Add doc comments to exported functions in core/config/config.go (Load, Write, ReadAt, WriteAt)
      - Add doc comments to exported types in core/user/user.go (User, UpdateUserInput structs)
      - Add doc comments to exported functions in core/user/user.go (UserFromContext, ContextWithUser, EnsureAdminUser, etc.)
      - Add doc comments to exported functions in core/auth/auth.go (InitOIDC, Login, Callback, Logout, Refresh, ClientToken)
      - Add doc comments to exported functions in rest/main.go (Main)
      - Add doc comments to exported functions in socket/main.go (Main)
    passing: false

  - category: backend
    description: Fix formatting issues identified by gofmt
    items:
      - Fix extra trailing newline in core/auth/test_admin.go
      - Fix struct field alignment in core/config/config.go
    passing: false

  - category: backend
    description: Fix Go interface naming convention issues (single-method interfaces should use -er suffix)
    items:
      - Rename subscriber.Subscribe to subscriber in socket/socket.go (method should be Subscribe to match -er convention)
      - Rename NATSPublisher to Publisher in core/message/message.go
      - Rename NATSPublisher to Publisher in rest/rest.go
      - Replace inline NATS publisher interface with named Publisher interface in rest/handler/common.go
      - Replace inline NATS publisher interfaces with named Publisher interface in rest/handler/message.go
    passing: false

  - category: backend
    description: Remove duplicate interface definitions (DRY principle)
    items:
      - Remove duplicate NATSPublisher interface from rest/rest.go (already defined in core/message/message.go)
      - Update rest/rest.go to import Publisher interface from core/message package
    passing: false

  - category: backend
    description: Review blank identifier usage in function call returns
    items:
      - Review NATS.Publish error handling in rest/handler/user.go:134, rest/handler/member.go:127,193, rest/handler/channel.go:53,187 - errors silently ignored with _ =
      - Review token refresh error handling in core/auth/auth.go:153 - both token and error ignored with _, _ =
      - Consider logging NATS publish errors rather than silently ignoring
      - Consider logging token refresh errors during logout rather than silently ignoring
    passing: false

  - category: backend
    description: Fix Go multiple return values (error handling idiom)
    items:
      - Change parseID in rest/handler/common.go to return (uint, error) instead of (uint, bool)
      - Change currentUser in rest/handler/common.go to return (*auth.User, error) instead of (*auth.User, bool)
    passing: false

  - category: backend
    description: Use named result parameters for clarity and shorter code
    items:
      - Add named result parameters to parseID in rest/handler/common.go (value, ok) to serve as documentation
      - Add named result parameters to currentUser in rest/handler/common.go (user, ok) to serve as documentation
      - Add named result parameters to findRepoRoot in core/config/dir.go (dir, err) for consistency with other functions
      - Add named result parameters to findRepoConfigDir in core/config/dir.go (dir, err) for consistency
      - Add named result parameters to parseChannelID in socket/socket.go (id, err) for clarity
      - Add named result parameters to GetNodeIP in core/k8s/k8s.go (ip, err) to match existing pattern in codebase
      - Add named result parameters to GetClusterIP in core/k8s/k8s.go (host, err) to match existing pattern
      - Add named result parameters to GetSecret in core/k8s/k8s.go (data, err) to match existing pattern
    passing: false

  - category: backend
    description: Use composite literals instead of zero-value initialization with field assignment
    items:
      - Convert Load() in core/config/config.go to use composite literal with labeled fields instead of &Config{} followed by field-by-field assignment
    passing: false

  - category: backend
    description: Review Go constants and iota enumerator patterns
    items:
      - Fix iota usage in core/user/user.go - use blank identifier to skip iota=0 (use const block with _ = iota, userContextKey contextKey = iota)
      - Fix iota usage in core/auth/user.go - use blank identifier to skip iota=0 (use const block with _ = iota, userContextKey contextKey = iota)
      - "No ByteSize pattern found - review not applicable"
    passing: false

  - category: backend
    description: Review Go type assertion patterns
    items:
      - "Review: Use comma, ok idiom for safe type assertions"
      - "Fix unsafe type assertions in rest/e2e_test.go:83 - ch[\"id\"].(string) should use comma, ok"
      - "Fix unsafe type assertions in rest/e2e_test.go:236 - msg[\"id\"].(string) should use comma, ok"
      - "Fix unsafe type assertions in rest/e2e_test.go:391 - ch[\"id\"].(string) should use comma, ok"
      - "Fix ignoring ok value in core/auth/auth.go:187 - newToken.Extra(\"id_token\").(string) should handle missing id_token gracefully"
    passing: false

  - category: backend
    description: Fix inefficient string operations in String() methods
    items:
      - "Review: Example Sequence.String() uses string concatenation in loop (str +=) - O(N²) complexity, should use strings.Builder"
      - "Fix: Replace string concatenation with strings.Builder or fmt.Fprintf with bytes.Buffer for O(n) performance"
    passing: false

  - category: backend
    description: Fix Generality issues - return interface types from constructors
    items:
      - Change Connect() in core/nats/nats.go to return NATSPublisher interface instead of *Conn concrete type (following crypto/cipher pattern like NewCTR returning Stream interface)
      - Update callers of Connect() in rest/main.go and socket/main.go to use the interface type
    passing: false

  - category: backend
    description: Review Go concurrency patterns (goroutines, channels, mutexes, race conditions)
    items:
      - "Fix race condition in core/auth/auth.go:34-38 - oauth2Config, issuerURL, oauth2JWKS global variables accessed without synchronization"
      - "Fix race condition in core/auth/auth.go:201 - clientPublicKey global variable accessed without synchronization"
      - "Fix race condition in core/config/dir.go:13-14 - testMode and cachedTree global variables accessed without synchronization"
      - "socket/socket.go:80 properly uses sync.Mutex to protect websocket WriteMessage calls - no issues"
      - "core/pg/pg.go:144-145 properly configures database connection pool (MaxIdleConns, MaxOpenConns) - no issues"
      - "core/nats/nats.go uses NATS server-side subscriptions (queue groups optional) - review not applicable"
      - "No goroutine leaks found - all goroutines have proper exit conditions (socket handler goroutine at line 130 exits on conn.ReadMessage error)"
      - "Fix goroutine signaling in socket/socket.go:130 - goroutine should use a channel to signal completion back to the caller (as recommended in review content: 'For that, we need channels')"
      - "Review leaky buffer pattern: No leaky buffer / free list pattern found in codebase - code uses simple channel patterns without this buffer reuse optimization"
    passing: false

  - category: backend
    description: Fix Go error handling - error strings must identify their origin
    items:
      - Add prefix "message:" to error strings in rest/handler/message.go (lines 68, 78, 88, 96, 122, 141, 149, 185, 193)
      - Add prefix "channel:" to error strings in rest/handler/channel.go (lines 86, 121, 175)
      - Add prefix "user:" to error strings in rest/handler/user.go (lines 40, 72)
      - Add prefix to error strings in rest/handler/common.go (line 28 "invalid "+param, line 37 "unauthorized")
    passing: false

  - category: backend
    description: Fix Go error handling - wrap errors with context in core packages
    items:
      - Wrap errors in core/config/yaml.go loadYAML function (return err without context at lines 30-32)
      - Wrap errors in core/config/yaml.go saveYAML function (return err without context at lines 37-40)
      - Wrap errors in core/config/dir.go findRepoRoot function (return err without context at line 56)
      - Wrap errors in core/config/dir.go findRepoConfigDir function (return err without context at line 113)
      - Wrap errors in core/auth/auth.go FindUserBySubject function (return result.Error without context at line 358)
      - Wrap errors in core/auth/auth.go FindUserByEmail function (return result.Error without context at line 394)
      - Wrap errors in core/auth/auth.go FindOrCreateUserByEmail function (return err without context at lines 376, 385)
      - Wrap errors in core/pg/pg.go Secret.read method (return err without context at lines 124-126)
      - Wrap errors in core/pg/pg.go Secret.open method (return err without context at lines 136, 140)
    passing: false
