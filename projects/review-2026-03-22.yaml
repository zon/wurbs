name: review-2026-03-22
description: Fix Go naming, documentation, and formatting issues

requirements:
  - category: backend
    description: Fix Go MixedCaps naming convention issues
    items:
      - Rename JWKSURI to JwksURI in core/auth/oidc.go (struct field uses uppercase acronyms, should use MixedCaps like JwksURI)
      - Rename user.User to user.UserModel in core/channel/channel.go for clarity
      - Rename AuthHandler, UserHandler, ChannelHandler, MessageHandler, MemberHandler in rest/handler/ to Auth, User, Channel, Message, Member to avoid redundant package name prefix (e.g., handler.AuthHandler -> handler.Auth)
      - Rename ConfigMap in core/config/configmap.go to Map to avoid redundant "Config" prefix (e.g., config.ConfigMap -> config.Map)
    passing: false

  - category: backend
    description: Add missing package comments for Go packages
    items:
      - Add package comment to core/message/message.go (e.g., "// Package message provides chat message functionality.")
      - Add package comment to core/channel/channel.go (e.g., "// Package channel provides channel management functionality.")
      - Add package comment to core/config/config.go (e.g., "// Package config provides configuration loading and management.")
      - Add package comment to core/user/user.go (e.g., "// Package user provides user management functionality.")
      - Add package comment to core/auth/auth.go (e.g., "// Package auth provides authentication and authorization.")
      - Add package comment to core/pg/pg.go (e.g., "// Package pg provides PostgreSQL database connectivity.")
      - Add package comment to core/nats/nats.go (e.g., "// Package nats provides NATS messaging connectivity.")
      - Add package comment to core/k8s/k8s.go (e.g., "// Package k8s provides Kubernetes integration.")
      - Add package comment to core/markdown/markdown.go (e.g., "// Package markdown provides markdown processing.")
    passing: false

  - category: backend
    description: Add doc comments to exported types and functions
    items:
      - Add doc comments to exported types in core/channel/channel.go (Channel struct)
      - Add doc comments to exported functions in core/channel/channel.go (Create, Get, List, Delete, AddMember, RemoveMember)
      - Add doc comments to exported types in core/config/config.go (Config struct)
      - Add doc comments to exported functions in core/config/config.go (Load, Write, ReadAt, WriteAt)
      - Add doc comments to exported types in core/user/user.go (User, UpdateUserInput structs)
      - Add doc comments to exported functions in core/user/user.go (UserFromContext, ContextWithUser, EnsureAdminUser, etc.)
      - Add doc comments to exported functions in core/auth/auth.go (InitOIDC, Login, Callback, Logout, Refresh, ClientToken)
      - Add doc comments to exported functions in rest/main.go (Main)
      - Add doc comments to exported functions in socket/main.go (Main)
    passing: false

  - category: backend
    description: Fix Go getter naming convention (avoid Get prefix for getters)
    items:
      - Ensure getters follow Go convention (Owner not GetOwner)
    passing: true

  - category: backend
    description: Fix formatting issues identified by gofmt
    items:
      - Fix extra trailing newline in core/auth/test_admin.go
      - Fix struct field alignment in core/config/config.go
    passing: false

  - category: backend
    description: Fix Go interface naming convention issues (single-method interfaces should use -er suffix)
    items:
      - Rename subscriber.Subscribe to subscriber in socket/socket.go (method should be Subscribe to match -er convention)
      - Rename NATSPublisher to Publisher in core/message/message.go
      - Rename NATSPublisher to Publisher in rest/rest.go
      - Replace inline NATS publisher interface with named Publisher interface in rest/handler/common.go
      - Replace inline NATS publisher interfaces with named Publisher interface in rest/handler/message.go
    passing: false

  - category: backend
    description: Verify Go semicolon insertion rules are followed (opening brace must be on same line as control statement)
    items:
      - Ensure no if/for/switch/select statements have opening brace on new line (would cause unwanted semicolon insertion)
    passing: true

  - category: backend
    description: Verify Go if statement style (omit unnecessary else when if body ends with return/break/continue/goto)
    items:
      - Verify if statements follow style (all else statements reviewed - rest/handler/user.go:112, rest/handler/member.go:81, core/user/user.go:94 - all appropriate as if bodies don't end with return)
    passing: true

  - category: backend
    description: Review Go map patterns (composite literals, indexing, comma ok idiom, sets)
    items:
      - "Reviewed files: all Go files in the project"
      - "Map composite literals properly used: map[string]string{}, map[string]any{}, map[uint]bool{}"
      - "Map indexing follows correct syntax: timeZone[\"EST\"], data[\"postgres.json\"]"
      - "Comma ok idiom properly implemented in core/pg/pg.go:62 for missing entry detection"
      - "Set implemented with bool map in core/message/message_test.go:200-202"
      - "No delete() calls found - maps don't require dynamic deletion in this codebase"
      - "No issues found - code follows Go map best practices from review content"
    passing: true

  - category: backend
    description: Review Go short declaration redeclaration and reassignment (:=) patterns
    items:
      - Verify := redeclaration follows Go spec (same scope, assignable value, at least one new variable)
      - "Reviewed files: core/auth/auth.go, core/config/config.go, core/k8s/k8s.go, core/nats/nats.go, core/message/message.go, core/channel/channel.go, rest/handler/*.go, socket/socket.go"
      - "No issues found - code follows idiomatic Go patterns for error handling with proper scoping"
    passing: true

  - category: backend
    description: Review Go for loop patterns (C-style, infinite, range)
    items:
      - Verify for loop follows Go spec (no while, proper range usage, blank identifier for unused values)
      - "Reviewed files: core/**/*.go, rest/**/*.go, socket/**/*.go, wurbctl/**/*.go"
      - "No issues found - code uses idiomatic Go for patterns: C-style for loops (i := 0; i < n; i++), infinite for { } with proper exit conditions, range with blank identifier _ for unused indices"
    passing: true

  - category: backend
    description: Review Go switch statement patterns
    items:
      - Verify switch statements follow idiomatic Go (use switch true for boolean conditions, use comma-separated cases, proper break/label usage)
      - "Reviewed files: core/**/*.go, rest/**/*.go, socket/**/*.go, wurbctl/**/*.go"
      - "No switch statements found in codebase - no issues to review"
    passing: true

  - category: backend
    description: Review Go type switch patterns
    items:
      - Verify type switches follow idiomatic Go (use type keyword in parentheses, declare variable with proper type in each case)
      - "Reviewed files: core/**/*.go, rest/**/*.go, socket/**/*.go, wurbctl/**/*.go"
      - "No type switches found in codebase - no issues to review"
    passing: true

  - category: backend
    description: Fix Go multiple return values (error handling idiom)
    items:
      - Change parseID in rest/handler/common.go to return (uint, error) instead of (uint, bool)
      - Change currentUser in rest/handler/common.go to return (*auth.User, error) instead of (*auth.User, bool)
    passing: false

  - category: backend
    description: Use named result parameters for clarity and shorter code
    items:
      - Add named result parameters to parseID in rest/handler/common.go (value, ok) to serve as documentation
      - Add named result parameters to currentUser in rest/handler/common.go (user, ok) to serve as documentation
      - Add named result parameters to findRepoRoot in core/config/dir.go (dir, err) for consistency with other functions
      - Add named result parameters to findRepoConfigDir in core/config/dir.go (dir, err) for consistency
      - Add named result parameters to parseChannelID in socket/socket.go (id, err) for clarity
      - Add named result parameters to GetNodeIP in core/k8s/k8s.go (ip, err) to match existing pattern in codebase
      - Add named result parameters to GetClusterIP in core/k8s/k8s.go (host, err) to match existing pattern
      - Add named result parameters to GetSecret in core/k8s/k8s.go (data, err) to match existing pattern
    passing: false

  - category: backend
    description: Review Go defer statement usage patterns
    items:
      - "Reviewed files: core/**/*.go, rest/**/*.go, socket/**/*.go, wurbctl/**/*.go"
      - "HTTP response bodies properly closed with defer in core/auth/oidc.go:101,123"
      - "Mutex locks properly paired with defer unlock in socket/socket.go:84,97,111"
      - "GORM database connections use connection pool - no explicit close needed"
      - "No defer-related issues found - code follows idiomatic Go defer patterns"
    passing: true

  - category: backend
    description: Review Go allocation with new vs make patterns
    items:
      - Verify proper usage of new vs make for slices/maps/channels
      - "Reviewed files: core/**/*.go, rest/**/*.go, socket/**/*.go, wurbctl/**/*.go"
      - "No new() calls found - code uses struct literals which is idiomatic"
      - "All make() calls verified correct: make(map[string]any), make(map[string]string), make(chan struct{})"
      - "sync.Mutex properly zero-initialized: var mu sync.Mutex in socket/socket.go:80"
      - "Types properly leverage zero-value-is-useful: Page{}, Channel{}, Message{} - all work without explicit initialization"
      - "No issues found - code follows Go allocation best practices"
    passing: true

  - category: backend
    description: Review Go array patterns (use slices instead fixed-size arrays)
    items:
      - Verify no fixed-size arrays ([N]int, [N]float64, etc.) exist in codebase
      - Verify no pointer-to-array patterns (*[N]T) exist (not idiomatic Go)
      - "Reviewed files: all Go files in the project"
      - "No fixed-size arrays found - code properly uses slices (e.g., []Message, []Channel)"
      - "No pointer-to-array patterns found - code follows idiomatic Go recommendation"
    passing: true

  - category: backend
    description: Review Go slice patterns (functions modifying slices must return them)
    items:
      - Verify functions that modify slices return the slice (not just the underlying array)
      - Verify Read functions accept slices ([]byte) rather than pointer + count
      - Verify append results are properly assigned (slice = append(slice, data))
      - "Reviewed: core/k8s/k8s.go, core/nats/nats.go, core/message/message.go, core/channel/channel.go, core/user/user.go, rest/handler/*.go, socket/socket.go"
      - "Functions properly return modified slices: k8s functions return new args slice after append"
      - "os.ReadFile returns []byte slice - proper slice usage for reading"
      - "append() calls properly assign results: args = append(args, ...) in k8s.go, nats.go"
      - "No issues found - code follows idiomatic Go slice patterns"
    passing: true

  - category: backend
    description: Use composite literals instead of zero-value initialization with field assignment
    items:
      - Convert Load() in core/config/config.go to use composite literal with labeled fields instead of &Config{} followed by field-by-field assignment
    passing: false

  - category: backend
    description: Review two-dimensional slice patterns
    items:
      - Verify no incorrect 2D slice allocation patterns (all slices allocated independently or single allocation with proper slicing)
      - "Reviewed files: all Go files in the project"
      - "No 2D slices ([][]T) or 2D arrays ([N][M]T) found in codebase - review not applicable"
    passing: true

  - category: backend
    description: Review Go constants and iota enumerator patterns
    items:
      - Fix iota usage in core/user/user.go - use blank identifier to skip iota=0 (use const block with _ = iota, userContextKey contextKey = iota)
      - Fix iota usage in core/auth/user.go - use blank identifier to skip iota=0 (use const block with _ = iota, userContextKey contextKey = iota)
      - "No ByteSize pattern found - review not applicable"
    passing: false

  - category: backend
    description: Review Go formatted printing (fmt.Printf, fmt.Sprintf, fmt.Fprintf) patterns
    items:
      - "Reviewed files: all Go files in the project"
      - "Integer formatting uses %d correctly: fmt.Sprintf(\"%d\", user.ID), fmt.Sprintf(\"%d\", channelID)"
      - "String formatting uses %s correctly: fmt.Sprintf(\"%s\", name), fmt.Sprintf(\"%s\", email)"
      - "Quoted string formatting uses %q: fmt.Sprintf(\"  %s: %q\\n\", k, v)"
      - "Error formatting uses %v (acceptable for errors): fmt.Sprintf(\"failed to exchange code: %v\", err)"
      - "No String() methods found - no risk of infinite recursion"
      - "fmt.Printf used appropriately with format strings: fmt.Printf(\"wrote %s\\n\", tree.Config)"
      - "fmt.Println used when no format verbs needed: fmt.Println(\"database migrations complete\")"
      - "fmt.Sprintf used for string construction with proper format verbs"
      - "No issues found - code follows Go printing best practices from review content"
    passing: true

  - category: backend
    description: Review Go variable declaration patterns (var with runtime expressions)
    items:
      - Verify variables use var declaration for runtime-computed values
      - "Reviewed files: core/**/*.go, rest/**/*.go, socket/**/*.go, wurbctl/**/*.go"
      - "Environment variable names properly use const: envConfigDir, envNatsTokenFile (these are string literals, not runtime values)"
      - "Runtime environment lookups use os.Getenv inside functions, not at package level: dir.go:92, nats.go:73"
      - "No os.Getenv used in const or var declarations at package level"
      - "Package-level variables properly declared with var: oauth2Config, issuerURL in auth.go; testMode, cachedTree in dir.go"
      - "No issues found - code follows Go variable declaration patterns from review content"
    passing: true

  - category: backend
    description: Review Go init function patterns
    items:
      - Verify init functions are niladic (take no arguments)
      - "Reviewed files: socket/e2e_test.go:140, rest/e2e_test.go:409"
      - "Both init functions properly niladic: func init() { ... }"
      - "Used for test state setup from environment variables (E2E_TEST_TOKEN)"
      - "No issues found - code follows Go init function best practices from review content"
    passing: true
