name: bootstrap
description: wurbctl CLI for creating Wurbs config and secret files

requirements:
  - category: wurbctl set config
    description: CLI command to configure postgres, OIDC settings, and generate k8s configmap and secret
    items:
      - Running `wurbctl set config` creates or updates the postgres user and database
      - OIDC settings are recorded via required CLI flags (no environment variables)
      - Missing required values (db credentials, oidc settings) cause an error with a clear message
      - The `--test` option creates or updates test user client credential flow keys
      - A deployment without test keys cannot create test users
      - Running without `--local` creates or updates a k8s configmap and secret
      - The `--local` option writes `config.yaml` and `secret.yaml` files for local development instead
      - The `--context` option selects which k8s context to use
      - The `--namespace` option selects which k8s namespace to use
    passing: true

  - category: wurbctl set admin
    description: CLI command to create or update an admin user and generate their credentials
    items:
      - Running `wurbctl set admin <email>` creates or updates an admin user with that email
      - Admin client credential flow keys are generated and saved to a k8s secret
      - The `--context` option selects which k8s context to use
      - The `--namespace` option selects which k8s namespace to use
    passing: true

  - category: ralph config
    description: Ralph configuration for the wurbs project
    items:
      - The .ralph/config.yaml file sets the namespace to ralph-wurbs
      - Before scripts build the rest and socket binaries
      - The rest service is started via make rest
      - The socket service is started via make socket
      - The workflow namespace is set to ralph-wurbs
      - The wurbs-config configmap is mounted to ./config/main.yaml
      - The wurbs-secret secret is mounted to ./config/secrets.yaml
      - The WURB_CONFIG env var is set to /workspace/config
    passing: false

  - category: wurbctl migrate db
    description: CLI command to run database migrations using connection details from config and secret files
    items:
      - Running `wurbctl migrate db` applies all pending database migrations
      - Connection details are read from the config and secret files, not environment variables
      - The config directory is resolved from the `WURB_CONFIG` env var, falling back to `/etc/wurbs`
    passing: true
