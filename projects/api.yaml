name: api
description: Wurbs API-only chat service with REST, WebSocket, auth, and NATS integration

requirements:
  - category: rest service
    description: REST JSON API service built with Gin that emits NATS messages on record changes
    items:
      - The rest service exposes a REST JSON API using Gin
      - Record changes publish matching NATS subject messages
      - The service accepts a --test flag that enables test users and test channels
    passing: true

  - category: socket service
    description: WebSocket service built with Gorilla that relays NATS messages to connected clients
    items:
      - Clients can open a WebSocket connection following a specific channel
      - NATS subject messages are relayed to the corresponding WebSocket channel
      - The service accepts a --test flag that enables test users and test channels
    passing: true

  - category: auth
    description: Authentication via OIDC and client credential flow
    items:
      - Users can authenticate using a generic OIDC provider
      - Clients can authenticate using the client credentials flow
      - Admin users can authenticate with both OIDC and client credentials
      - Real users can only authenticate with OIDC
      - Test users can only authenticate with client credentials
      - All test users share the same client credential flow keys
    passing: false

  - category: channels
    description: Support for multiple chat channel types
    items:
      - Public and private channels are supported
      - Real channels can only contain real users
      - Test channels can contain both real and test users
    passing: false

  - category: admin users
    description: Admin capabilities for managing the system
    items:
      - Admin users can manage channels
      - Admin users can invite users
    passing: false

  - category: end to end tests
    description: Tests that exercise the full system using test channels and users
    items:
      - Tests require admin client credential flow keys to run
      - Tests create and clean up test channels and users
      - Tests avoid real channels, real users, and OIDC auth
    passing: false

  - category: containerfile
    description: Container image built with podman containing both services and wurbctl
    items:
      - A Containerfile builds an image containing the rest and socket services
      - The image includes the wurbctl binary
      - The image is built using podman
    passing: false

  - category: helm chart
    description: Helm chart with separate deployments for the rest and socket services
    items:
      - The rest service has its own Deployment
      - The socket service has its own Deployment
      - The rest Deployment includes an init container that runs wurbctl migrate db before the main container starts
    passing: false

  - category: makefile
    description: Make targets for running, testing, and deploying the services
    items:
      - make rest starts the rest service with air in --test mode
      - make socket starts the socket service with air in --test mode
      - make install runs go install wurbctl
      - make test runs all tests
      - make push builds and pushes the container using a docker access token from file
    passing: false

  - category: core/config
    description: Deep module for loading configuration and secrets from files
    items:
      - Exposes a narrow public interface for loading config and secrets
      - Config is read from <dir>/config.yaml and secrets from <dir>/secret.yaml
      - The config directory defaults to /etc/wurbs and can be overridden with the WURB_CONFIG env var
      - In test mode, if WURB_CONFIG is not set, the module walks up from the working directory to find the git repo root and uses ./config there if it exists
    passing: true

  - category: core/pg
    description: Deep module for initializing a PostgreSQL connection via GORM
    items:
      - Exposes a narrow public interface for opening a database connection
      - Returns a *gorm.DB handle ready for use
      - Supports auto-migration of models
    passing: true

  - category: core/auth
    description: Deep module for authentication middleware and user context
    items:
      - Exposes narrow middleware interfaces for OIDC and client credential flows
      - Exposes a helper to extract the authenticated user from context
      - Owns the User model
    passing: true

  - category: core/channel
    description: Deep module for channel management and membership rules
    items:
      - Exposes a narrow public interface for creating and managing channels
      - Owns the Channel model
      - Enforces that real channels can only contain real users
      - Enforces that test channels can contain both real and test users
    passing: true

  - category: core/message
    description: Deep module for chat messages
    items:
      - Exposes a narrow public interface for creating and querying messages
      - Owns the Message model
      - Supports paginated message queries
      - Publishes messages to NATS on creation
    passing: true

  - category: core/nats
    description: Deep module for NATS connection and messaging
    items:
      - Exposes a narrow public interface for connecting to NATS
      - Exposes helpers for publishing messages to NATS subjects
      - Handles NATS auth callout using k8s service tokens
    passing: true
