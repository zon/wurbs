asyncapi: 3.1.0

info:
  title: Wurbs
  version: 1.0.0
  description: |
    Chat application WebSocket API.

    **Authorization rules:**
    - Admins are implicit members of every channel
    - Only channel members may connect to a channel event stream

servers:
  websocket:
    host: localhost:8081
    protocol: ws
    description: WebSocket event server
    security:
      - $ref: '#/components/securitySchemes/oidc'

channels:
  channelEvents:
    address: /channels/{channelId}
    servers:
      - $ref: '#/servers/websocket'
    description: Real-time event stream for a channel. Only channel members may connect.
    parameters:
      channelId:
        $ref: '#/components/parameters/channelId'
    messages:
      MessageEvent:
        $ref: '#/components/messages/MessageEvent'
      MemberEvent:
        $ref: '#/components/messages/MemberEvent'
      UserEvent:
        $ref: '#/components/messages/UserEvent'
      Unsubscribe:
        $ref: '#/components/messages/Unsubscribe'

operations:
  subscribeChannelEvents:
    action: receive
    summary: Receive real-time events for a channel. Channel members only.
    channel:
      $ref: '#/channels/channelEvents'
    messages:
      - $ref: '#/channels/channelEvents/messages/MessageEvent'
      - $ref: '#/channels/channelEvents/messages/MemberEvent'
      - $ref: '#/channels/channelEvents/messages/UserEvent'

  unsubscribeChannelEvents:
    action: send
    summary: Unsubscribe from the channel event stream.
    channel:
      $ref: '#/channels/channelEvents'
    messages:
      - $ref: '#/channels/channelEvents/messages/Unsubscribe'

components:
  securitySchemes:
    oidc:
      type: openIdConnect
      openIdConnectUrl: https://auth.example.com/.well-known/openid-configuration

  parameters:
    channelId:
      description: Channel identifier

  messages:
    Unsubscribe:
      name: Unsubscribe
      summary: Sent by the client to unsubscribe from the channel event stream.
      contentType: application/json
      payload:
        type: object

    MessageEvent:
      name: MessageEvent
      summary: Emitted when a message is created, edited, or deleted
      contentType: application/json
      payload:
        $ref: '#/components/schemas/MessageEvent'

    MemberEvent:
      name: MemberEvent
      summary: Emitted when a user joins or leaves a channel
      contentType: application/json
      payload:
        $ref: '#/components/schemas/MemberEvent'

    UserEvent:
      name: UserEvent
      summary: Emitted when a channel member updates their username
      contentType: application/json
      payload:
        $ref: '#/components/schemas/UserEvent'

  schemas:
    User:
      type: object
      required: [id, email, admin, inactive, createdAt]
      properties:
        id:
          type: string
        username:
          type: string
          description: Null until the user completes onboarding after first login
          nullable: true
        email:
          type: string
          format: email
        admin:
          type: boolean
        inactive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    Message:
      type: object
      required: [id, channelId, userId, body, createdAt]
      properties:
        id:
          type: string
        channelId:
          type: string
        userId:
          type: string
        body:
          type: string
          description: Markdown body
        createdAt:
          type: string
          format: date-time
        editedAt:
          type: string
          format: date-time
          description: Present if the message has been edited

    MessageEvent:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [created, updated, deleted]
        message:
          $ref: '#/components/schemas/Message'

    MemberEvent:
      type: object
      required: [type, user]
      properties:
        type:
          type: string
          enum: [joined, left]
        user:
          $ref: '#/components/schemas/User'

    UserEvent:
      type: object
      required: [userId, username]
      properties:
        userId:
          type: string
        username:
          type: string
